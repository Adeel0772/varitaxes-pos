name: Deploy to pos.varitaxes.com

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-pos-production
  cancel-in-progress: true

jobs:
  deploy:
    name: FTP deploy → pos.varitaxes.com
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, pdo_mysql, gd
          coverage: none

      - name: Install Composer dependencies
        run: composer install --no-dev --optimize-autoloader --no-interaction --prefer-dist

      - name: Reset FTP sync cache (force upload critical files)
        run: rm -f .ftp-deploy-sync-state.json

      - name: Deploy via FTP (Hostinger subdomain account)
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: 21
          protocol: ftp
          timeout: 600000
          local-dir: ./
          server-dir: ./
          state-name: .ftp-deploy-sync-state.json
          log-level: standard
          dangerous-clean-slate: false
          exclude: |
            **/.git*
            **/.github/**
            **/tests/**
            **/scripts/**
            **/push-to-github.ps1
            **/DEPLOY.md
            **/README.md
            **/.gitignore
            **/router.php
            **/database/seed.sql
